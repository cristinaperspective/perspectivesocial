<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blog · Perspective Social</title>
<meta name="description" content="Insights and updates from Perspective Social.">
<link rel="canonical" href="https://perspectivesocial.com/blog/">
<meta property="og:title" content="Blog · Perspective Social"><meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4EFE7;--surface:#FFFFFF;--border:#E5DFD3;--text:#161A17;--dim:#6B665E;--accent:#FF3D1F;--accentText:#FFFFFF;--disp:'Anton',sans-serif;--body:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--body)}
a{color:inherit;text-decoration:none}.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
nav{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:5}
.nav{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:var(--disp);font-weight:700;font-size:18px}.logo b{color:var(--accent)}
.nav a.back{font-size:14px;color:var(--dim)}
header{padding:70px 0 40px}h1{font-family:var(--disp);font-weight:700;font-size:clamp(34px,5vw,52px);line-height:1.05}
h1 em{font-style:normal;color:var(--accent)}.lead{color:var(--dim);font-size:17px;margin-top:14px;max-width:560px;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px 0 80px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px)}
.card .cv{aspect-ratio:16/10;background:var(--bg);object-fit:cover;width:100%}
.card .bd{padding:20px;display:flex;flex-direction:column;gap:8px;flex:1}
.card .dt{font-family:var(--disp);font-size:11px;color:var(--dim)}
.card h3{font-family:var(--disp);font-size:18px;line-height:1.2}
.card p{font-size:14px;color:var(--dim);line-height:1.55;flex:1}
.card .rd{font-family:var(--disp);font-size:12px;color:var(--accent)}
.empty{padding:60px;text-align:center;color:var(--dim)}
@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style></head><body>
<nav><div class="wrap nav"><a href="/" class="logo">Perspective <b>Social</b></a><a href="/" class="back">← Back to site</a></div></nav>
<div class="wrap"><header><h1>Insights &amp; <em>ideas</em></h1><div class="lead">Notes, updates and ideas from Perspective Social.</div></header>
<div class="grid" id="grid"></div></div>
<script>
fetch('./posts.json?cb='+Date.now()).then(r=>r.ok?r.json():[]).then(posts=>{
  const g=document.getElementById('grid');
  if(!posts.length){g.innerHTML='<div class="empty">No articles yet. Check back soon.</div>';return;}
  g.innerHTML=posts.map(p=>`<a class="card" href="./${p.slug}/">${p.cover?'<img class=cv src="'+p.cover+'">':'<div class=cv></div>'}<div class="bd"><div class="dt">${new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div><h3>${p.title}</h3><p>${p.desc||''}</p><div class="rd">Read →</div></div></a>`).join('');
});
</script></body></html>
